name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create dbt profiles directory
        run: |
          mkdir -p ~/.dbt
          printf '%s\n' \
            'pricing_dbt:' \
            '  target: dev' \
            '  outputs:' \
            '    dev:' \
            '      type: duckdb' \
            '      path: ./data/processed/pricing_dbt.duckdb' \
            '      threads: 1' \
            '      extensions: []' \
            > ~/.dbt/profiles.yml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dbt models and tests
        working-directory: pricing_dbt
        run: |
          dbt --version
          dbt run
          dbt test

      - name: Run pricing pipeline
        run: |
          python scripts/run_pipeline.py

      - name: Run basic linting
        run: |
          python -m py_compile scripts/pricing_model.py scripts/transform.py scripts/run_pipeline.py streamlit_app.py
